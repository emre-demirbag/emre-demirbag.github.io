<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TV NODE</title>
  <style>
    :root{
      --bg:#04070b;
      --panel:#10141f;
      --stroke:rgba(0,255,170,.22);
      --stroke2:rgba(0,255,170,.12);
      --txt:rgba(236,255,244,.96);
      --muted:rgba(148,199,179,.82);
      --accent:#7dffd0;
      --radius:18px;
      --shadow:0 18px 60px rgba(0,0,0,.75);
    }
    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      background:
        radial-gradient(900px 700px at 30% 10%, #133529 0%, var(--bg) 55%, #020306 100%);
      color:var(--txt);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    body{
      display:grid;
      place-items:center;
      padding:20px;
      overflow:hidden;
    }

    .wrap{
      width:min(1200px, 96vw);
      height:min(680px, 92vh);
      display:grid;
      grid-template-columns: 1fr 260px;
      gap:14px;
      align-items:stretch;
    }

    .tv{
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      background:
        radial-gradient(120% 160% at 10% -20%, rgba(125,255,208,.16), transparent 55%),
        linear-gradient(180deg, rgba(5,12,10,.98), rgba(2,4,6,.96));
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      min-width:0;
    }

    /* CRT frame */
    .screen{
      position:absolute;
      inset:16px 18px 18px 18px;
      border-radius: 18px;
      background:#000;
      overflow:hidden;
      border:1px solid rgba(0,255,170,.22);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.9),
        0 0 26px rgba(0,0,0,.9);
    }

    /* content layer */
    .content{
      position:absolute; inset:0;
      display:grid;
      place-items:center;
      padding:18px;
    }

    /* noise layer */
    canvas#noise{
      position:absolute; inset:0;
      width:100%; height:100%;
      opacity:.20;
      mix-blend-mode: screen;
      pointer-events:none;
    }

    /* scanlines + vignette */
    .crt{
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(125% 90% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%),
        repeating-linear-gradient(to bottom, rgba(255,255,255,.12) 0px, rgba(255,255,255,.02) 1px, rgba(0,0,0,0) 3px);
      opacity:.26;
      mix-blend-mode: soft-light;
    }

    /* OSD */
    .osd{
      position:absolute;
      left:18px; top:18px;
      display:flex;
      gap:10px;
      align-items:center;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid rgba(0,255,170,.35);
      background: rgba(1,10,6,.75);
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      box-shadow: 0 0 16px rgba(0,255,170,.35);
      opacity:0;
      transform: translateY(-6px);
      transition: opacity .25s ease, transform .25s ease;
      z-index:5;
      white-space:nowrap;
      font-size:12px;
    }
    .osd.show{ opacity:1; transform: translateY(0); }
    .osd b{color:var(--accent)}
    .osd .muted{color:var(--muted)}
    .osdRight{
      margin-left:8px;
      padding-left:10px;
      border-left:1px solid rgba(0,255,170,.28);
      color:rgba(192,255,220,.92);
    }

    /* Remote */
    .remote{
      border:1px solid var(--stroke);
      border-radius: 30px;
      background:
        radial-gradient(160% 220% at -30% 0%, rgba(125,255,208,.12), transparent 55%),
        linear-gradient(180deg, rgba(10,18,16,.96), rgba(3,6,10,.96));
      box-shadow: var(--shadow);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
      min-height:0;
    }
    .remote .title{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 10px;
      border:1px solid var(--stroke2);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(4,10,8,.92), rgba(2,4,6,.96));
      color: rgba(218,255,236,.94);
      font-weight:800;
      letter-spacing:1px;
      font-size:13px;
    }
    .btnGrid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      padding: 8px;
    }
    .rbtn{
      height:54px;
      border-radius:999px;
      border:1px solid rgba(0,255,170,.28);
      background:
        radial-gradient(140% 140% at 30% 20%, rgba(255,255,255,.08), rgba(0,0,0,.32));
      color: rgba(226,255,240,.96);
      font-size:20px;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 6px 18px rgba(0,0,0,.75);
      user-select:none;
      transition: transform .08s ease, box-shadow .08s ease, background .12s ease;
    }
    .rbtn:active{
      transform: translateY(1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 2px 10px rgba(0,0,0,.8);
    }
    .rbtn.power{
      background:
        radial-gradient(120% 120% at 30% 20%, rgba(255,80,80,.65), rgba(0,0,0,.28));
      border-color: rgba(255,80,80,.55);
    }

    .row2{
      display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:0 8px 8px;
    }
    .small{
      height:46px; font-size:13px; letter-spacing:.8px;
    }

    .legend{
      padding:8px 10px 6px;
      color: rgba(188,227,214,.80);
      font-size:11px;
      line-height:1.5;
    }
    .legend code{ color: rgba(226,255,240,.95); }

    /* Channel screens */
    .card{
      width:min(700px, 100%);
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      border:1px solid rgba(0,255,170,.30);
      background:
        radial-gradient(140% 130% at 10% 0%, rgba(110,255,200,.12), transparent 55%),
        linear-gradient(180deg, #020504, #050806);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.9),
        0 0 26px rgba(0,0,0,.95);
    }

    /* image-based channels */
    .image-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter: contrast(1.1) saturate(1.05);
    }
    .image-card{
      background:#000;
    }

    /* Kodtag channel – full cover + drift + hafif distortion */
    .kodtag-card{
      background:#000;
      padding:0;
    }
    .kodtag-link{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .kodtag-logo-wrap{
      width:100%;
      height:100%;
      max-width:none;
      display:flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 0 18px rgba(0,255,170,.35));
      animation: kodtag-drift 4.2s ease-in-out infinite alternate;
    }
    .kodtag-logo{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      animation: kodtag-warp 2.8s ease-in-out infinite alternate;
    }

    @keyframes kodtag-drift{
      0%   { transform: translateX(-3%); }
      100% { transform: translateX(3%); }
    }
    @keyframes kodtag-warp{
      0%{
        transform: scale(1.02) skewX(-0.4deg);
        filter: contrast(1.05) saturate(1.05);
      }
      100%{
        transform: scale(1.04) skewX(0.4deg);
        filter: contrast(1.12) saturate(1.15) hue-rotate(-2deg);
      }
    }

    /* “Static burst” fullscreen overlay when switching */
    .switchStatic{
      position:absolute; inset:0;
      background:#000;
      opacity:0;
      pointer-events:none;
      z-index:6;
      transition: opacity .12s ease;
    }
    .switchStatic.on{ opacity:1; }

    @media (max-width: 980px){
      body{overflow:auto}
      .wrap{ grid-template-columns: 1fr; height:auto; }
      .remote{ border-radius: 22px; }
      .tv{ height: 66vh; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="tv" id="tv">
    <div class="screen" id="screen">
      <div class="content" id="content"></div>

      <canvas id="noise"></canvas>
      <div class="crt"></div>

      <div class="osd" id="osd">
        <span><b id="osdCh">CH01</b> <span class="muted" id="osdName">KNIGHT RIDER</span></span>
        <span class="osdRight" id="osdTime">--:--:--</span>
      </div>

      <div class="switchStatic" id="switchStatic"></div>
    </div>
  </div>

  <aside class="remote" aria-label="Remote control">
    <div class="title">
      <span>REMOTE</span>
      <span style="color:rgba(188,227,214,.82);font-size:12px" id="remoteCh">CH01</span>
    </div>

    <div class="btnGrid">
      <button class="rbtn power" data-action="power">⏻</button>
      <button class="rbtn" data-action="chUp">▲</button>
      <button class="rbtn" data-action="mute">🔇</button>

      <button class="rbtn" data-ch="1">1</button>
      <button class="rbtn" data-ch="2">2</button>
      <button class="rbtn" data-ch="3">3</button>

      <button class="rbtn" data-ch="4">4</button>
      <button class="rbtn" data-ch="5">5</button>
      <button class="rbtn" data-ch="6">6</button>

      <button class="rbtn" data-ch="7">7</button>
      <button class="rbtn" data-ch="8">8</button>
      <button class="rbtn" data-ch="9">9</button>

      <button class="rbtn small" data-action="txt">TTX</button>
      <button class="rbtn" data-ch="0">0</button>
      <button class="rbtn small" data-action="chDown">▼</button>
    </div>

    <div class="row2">
      <button class="rbtn small" data-action="info">INFO</button>
      <button class="rbtn small" data-action="test">TEST</button>
    </div>

    <div class="legend">
      <div><code>↑/↓</code> kanal</div>
      <div><code>0–9</code> direkt</div>
      <div><code>S</code> noise toggle</div>
      <div><code>I</code> info</div>
    </div>
  </aside>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // ===== Channels =====
  const channels = [
    { id: 0, name: "T2",            type: "image", src: "assets/images/t2.gif" },
    { id: 1, name: "KNIGHT RIDER",  type: "image", src: "assets/images/rider.gif" },
    { id: 2, name: "BBC CLOCK",     type: "clock" },
    { id: 3, name: "BTF",           type: "image", src: "assets/images/btf.gif" },
    { id: 4, name: "COSMIC",        type: "image", src: "assets/images/cosmic.gif" },
    { id: 5, name: "DIE HARD 3",    type: "image", src: "assets/images/diehard3.gif" },
    { id: 6, name: "MATRIX",        type: "image", src: "assets/images/matrix.gif" },
    { id: 7, name: "COLOR BARS",    type: "image", src: "assets/images/rainbow.gif" },
    { id: 8, name: "ROAD WARRIOR",  type: "image", src: "assets/images/roadwarrior.gif" },
    { id: 9, name: "KODTAG",        type: "kodtag", src: "assets/images/kodtag.gif" }
  ];

  let current = 1;
  let powerOn = true;
  let muted = false;
  let txtEnabled = true;

  const content = $("content");
  const osd = $("osd");
  const osdCh = $("osdCh");
  const osdName = $("osdName");
  const osdTime = $("osdTime");
  const remoteCh = $("remoteCh");
  const switchStatic = $("switchStatic");

  // ===== Clock =====
  function pad2(n){ return String(n).padStart(2,"0"); }
  function nowStr(){
    const d = new Date();
    return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  setInterval(() => { osdTime.textContent = nowStr(); }, 250);
  osdTime.textContent = nowStr();

  function showOSD(){
    osd.classList.add("show");
    clearTimeout(showOSD._t);
    showOSD._t = setTimeout(() => osd.classList.remove("show"), 1300);
  }

  function chLabel(n){
    return "CH" + String(n).padStart(2,"0");
  }

  // ===== Screens =====
  function renderStatic(){
    content.innerHTML = `
      <div class="card">
        <div style="width:100%;height:100%;background:#000;"></div>
      </div>
    `;
  }

  function renderTestCard(){
    content.innerHTML = `
      <div class="card">
        <div style="
          position:absolute; inset:0;
          background:
            linear-gradient(90deg,#c9c9c9 0 12.5%, #ffe36c 12.5% 25%, #6bf7ff 25% 37.5%, #6bff9a 37.5% 50%,
                            #ff6bf3 50% 62.5%, #ff6b6b 62.5% 75%, #6b88ff 75% 87.5%, #101215 87.5% 100%);
        "></div>
        <div style="position:absolute; inset:0; background: radial-gradient(70% 70% at 50% 40%, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%);"></div>
        <div style="position:absolute; bottom:54px; left:10%; right:10%; height:38px; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; letter-spacing:2px; font-weight:900; font-size:14px;">
          TEST CARD • 4:3
        </div>
      </div>
    `;
  }

  function renderClock(){
    content.innerHTML = `
      <div class="card">
        <svg viewBox="0 0 800 600" width="100%" height="100%" style="display:block">
          <defs>
            <radialGradient id="g" cx="50%" cy="35%" r="70%">
              <stop offset="0%" stop-color="rgba(190,255,220,.16)"/>
              <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,.85)"/>
            </radialGradient>
          </defs>
          <rect width="800" height="600" fill="#020504"/>
          <rect width="800" height="600" fill="url(#g)" opacity=".95"/>

          <g transform="translate(400 250)">
            ${Array.from({length:12}).map((_,i)=>{
              const a = (i/12)*Math.PI*2;
              const x1 = Math.cos(a)*150, y1=Math.sin(a)*150;
              const x2 = Math.cos(a)*175, y2=Math.sin(a)*175;
              return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(113,225,190,.9)" stroke-width="10" stroke-linecap="round"/>`;
            }).join("")}
            <circle r="5" fill="rgba(236,255,244,.9)"/>
            <line id="hh" x1="0" y1="0" x2="0" y2="-85" stroke="rgba(186,255,206,.96)" stroke-width="14" stroke-linecap="round"/>
            <line id="mm" x1="0" y1="0" x2="0" y2="-120" stroke="rgba(186,255,206,.96)" stroke-width="10" stroke-linecap="round"/>
            <line id="ss" x1="0" y1="8" x2="0" y2="-145" stroke="rgba(186,255,206,.75)" stroke-width="4" stroke-linecap="round"/>
          </g>

          <text x="400" y="470" text-anchor="middle" fill="rgba(186,255,206,.92)" style="font-size:86px; font-family: ui-serif, Georgia, serif; letter-spacing:2px;">BBC1</text>
          <text x="400" y="535" text-anchor="middle" fill="rgba(186,255,206,.78)" style="font-size:46px; font-family: ui-serif, Georgia, serif; letter-spacing:2px;">1985-12-28</text>
        </svg>
      </div>
    `;

    const svg = content.querySelector("svg");
    const hh = svg.querySelector("#hh");
    const mm = svg.querySelector("#mm");
    const ss = svg.querySelector("#ss");

    const tick = () => {
      const d = new Date();
      const h = d.getHours()%12;
      const m = d.getMinutes();
      const s = d.getSeconds() + d.getMilliseconds()/1000;

      const aH = (h + m/60) * 30;
      const aM = (m + s/60) * 6;
      const aS = s * 6;

      hh.setAttribute("transform", `rotate(${aH})`);
      mm.setAttribute("transform", `rotate(${aM})`);
      ss.setAttribute("transform", `rotate(${aS})`);
      requestAnimationFrame(tick);
    };
    tick();
  }

  function renderImageChannel(ch){
    content.innerHTML = `
      <div class="card image-card">
        <img src="${ch.src}" alt="${ch.name}" />
      </div>
    `;
  }

  function renderKodtagChannel(ch){
    const src = ch.src || "assets/images/kodtag.gif";
    content.innerHTML = `
      <div class="card kodtag-card">
        <a href="https://kodtag.io" target="_blank" rel="noopener noreferrer"
           class="kodtag-link" aria-label="Open Kodtag">
          <div class="kodtag-logo-wrap">
            <img src="${src}" alt="KODTAG" class="kodtag-logo" />
          </div>
        </a>
      </div>
    `;
  }

  function renderChannel(n){
    const ch = channels.find(c => c.id === n) || channels[0];
    if (!powerOn){
      content.innerHTML = `<div class="card" style="display:grid;place-items:center;color:rgba(192,255,220,.82);letter-spacing:2px;font-size:14px;">POWER OFF</div>`;
      return;
    }
    switch(ch.type){
      case "clock":  renderClock(); break;
      case "image":
        if (ch.name === "KODTAG") renderKodtagChannel(ch);
        else renderImageChannel(ch);
        break;
      case "kodtag": renderKodtagChannel(ch); break;
      case "static":
      default:       renderStatic(); break;
    }
  }

  function setChannel(n, {silent=false} = {}){
    const max = Math.max(...channels.map(c=>c.id));
    const min = Math.min(...channels.map(c=>c.id));
    if (n < min) n = max;
    if (n > max) n = min;
    current = n;

    osdCh.textContent = chLabel(current);
    const ch = channels.find(c=>c.id===current);
    osdName.textContent = ch ? ch.name : "UNKNOWN";
    remoteCh.textContent = chLabel(current);

    if (!silent){
      switchStatic.classList.add("on");
      setTimeout(() => {
        renderChannel(current);
        showOSD();
      }, 120);
      setTimeout(() => switchStatic.classList.remove("on"), 320);
    } else {
      renderChannel(current);
    }
  }

  // ===== Noise canvas =====
  const noise = $("noise");
  const ctx = noise.getContext("2d", { alpha: true });

  function resize(){
    const r = noise.getBoundingClientRect();
    noise.width = Math.floor(r.width * devicePixelRatio);
    noise.height = Math.floor(r.height * devicePixelRatio);
  }
  window.addEventListener("resize", resize, {passive:true});
  resize();

  let last = 0;
  function drawNoise(t){
    requestAnimationFrame(drawNoise);
    if (!txtEnabled || !powerOn) return;
    if (t - last < 40) return;
    last = t;

    const w = noise.width, h = noise.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;

    for (let i=0; i<d.length; i+=4){
      const v = (Math.random()*255) | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v;
      d[i+3] = 40;
    }
    ctx.putImageData(img, 0, 0);
  }
  requestAnimationFrame(drawNoise);

  // ===== Remote handlers =====
  document.querySelectorAll("[data-ch]").forEach(btn => {
    btn.addEventListener("click", () => setChannel(parseInt(btn.dataset.ch,10)));
  });
  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => handleAction(btn.dataset.action));
  });

  function handleAction(a){
    if (a === "chUp")   return setChannel(current+1);
    if (a === "chDown") return setChannel(current-1);
    if (a === "power"){ powerOn = !powerOn; setChannel(current,{silent:true}); showOSD(); return; }
    if (a === "mute"){  muted = !muted; showOSD(); return; }
    if (a === "txt"){   window.location.href = "matrix.html"; return; }
    if (a === "info"){  showOSD(); return; }
    if (a === "test"){
      // test kartı sadece TEST ile, kanal numarası değişmeden
      renderTestCard();
      osdCh.textContent = "TEST";
      osdName.textContent = "CARD";
      showOSD();
      return;
    }
  }

  // keyboard
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") { e.preventDefault(); setChannel(current+1); }
    else if (e.key === "ArrowDown") { e.preventDefault(); setChannel(current-1); }
    else if (e.key >= "0" && e.key <= "9") { setChannel(parseInt(e.key,10)); }
    else if (e.key.toLowerCase() === "s") { txtEnabled = !txtEnabled; showOSD(); }
    else if (e.key.toLowerCase() === "i") { showOSD(); }
  }, {passive:false});

  // boot
  setChannel(1, {silent:true});
  showOSD();
})();
</script>
</body>
</html>
